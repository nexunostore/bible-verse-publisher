name: Publish Bible Stories

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # optional: runs every 6 hours

concurrency:
  group: bible-story-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Ensure tracking file exists
        id: track
        run: |
          FILE=".published-stories.json"

          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          echo "tracking_file=$FILE" >> $GITHUB_OUTPUT

      - name: Find unpublished stories (SAFE)
        id: find
        run: |
          TRACK_FILE="${{ steps.track.outputs.tracking_file }}"
          PUBLISHED=$(cat $TRACK_FILE)

          NEW_FILES=""

          while IFS= read -r -d '' file; do
            filename=$(basename "$file")

            if echo "$PUBLISHED" | grep -q "\"$filename\""; then
              echo "Skipping: $filename"
            else
              echo "New: $filename"
              NEW_FILES+="$file"$'\n'
            fi

          done < <(find Bible_Stories -type f -name "*.txt" -print0)

          echo "new_files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish stories
        if: steps.find.outputs.new_files != ''
        run: |
          TRACK_FILE="${{ steps.track.outputs.tracking_file }}"
          PUBLISHED=$(cat $TRACK_FILE)

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            echo "Publishing: $file"

            TITLE=$(head -n 1 "$file")

            CATEGORY_LINE=$(sed -n '2p' "$file" | sed 's/categories://I')
            CATEGORIES=$(echo "$CATEGORY_LINE" | tr -d ' ')

            CONTENT=$(tail -n +3 "$file" \
              | awk '
                  BEGIN { paragraph="" }
                  {
                    if (NF == 0) {
                      if (paragraph != "") {
                        print "<p>" paragraph "</p>"
                        paragraph=""
                      }
                    } else {
                      if (paragraph == "") {
                        paragraph=$0
                      } else {
                        paragraph=paragraph " " $0
                      }
                    }
                  }
                  END {
                    if (paragraph != "") {
                      print "<p>" paragraph "</p>"
                    }
                  }
                ' \
              | sed 's/^## \(.*\)$/<h2>\1<\/h2>/' \
              | sed 's/^# \(.*\)$/<h1>\1<\/h1>/' \
              | jq -Rs .)

            BASENAME=$(basename "$file" .txt)
            SLUG=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

            echo "{\"title\":\"$TITLE\",\"slug\":\"$SLUG\",\"status\":\"publish\",\"categories\":[$CATEGORIES],\"content\":$CONTENT}" > post.json

            curl -X POST \
              -u "${WP_USERNAME}:${WP_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d @post.json \
              "${WP_URL}/wp-json/wp/v2/posts"

            # mark as published
            PUBLISHED=$(echo "$PUBLISHED" | jq ". + [\"$(basename "$file")\"]")

          done <<< "${{ steps.find.outputs.new_files }}"

          echo "$PUBLISHED" > $TRACK_FILE

      - name: Commit tracking file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .published-stories.json
          git commit -m "Update published stories tracker" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: echo "Publishing complete"

    env:
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_PASSWORD: ${{ secrets.WP_PASSWORD }}