name: Publish Bible Stories

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: bible-story-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Publish stories (category names system)
        run: |
          set -e

          WP_AUTH="-u ${WP_USERNAME}:${WP_PASSWORD}"

          echo "Scanning Bible_Stories..."

          find Bible_Stories -type f -name "*.txt" | while read -r file; do

            echo "--------------------------------------"
            echo "Processing: $file"

            TITLE=$(head -n 1 "$file" | tr -d '\r')

            # -----------------------------
            # CATEGORY PARSING (NAMES NOW)
            # -----------------------------
            CATEGORY_LINE=$(sed -n '2p' "$file" | sed 's/categories://I')
            RAW_CATEGORIES=$(echo "$CATEGORY_LINE" | tr -d ' ')

          IFS=',' read -ra CAT_ARRAY <<< "$RAW_CATEGORIES"

          for CAT in "${CAT_ARRAY[@]}"; do
            CAT=$(echo "$CAT" | xargs)

            echo "Processing category name: '$CAT'"

            SEARCH_RESULT=$(curl -s $WP_AUTH \
              "${WP_URL}/wp-json/wp/v2/categories?search=$(echo "$CAT" | sed 's/ /%20/g')")

            CAT_ID=$(echo "$SEARCH_RESULT" | jq -r --arg name "$CAT" '
              map(select(.name == $name)) | .[0].id // empty
            ')

            if [ -n "$CAT_ID" ]; then
              echo "Found existing category: $CAT ($CAT_ID)"
            else
              echo "Creating category: $CAT"

              CREATE_RESULT=$(curl -s -X POST $WP_AUTH \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"$CAT\"}" \
                "${WP_URL}/wp-json/wp/v2/categories")

              CAT_ID=$(echo "$CREATE_RESULT" | jq -r '.id')

              echo "Created category: $CAT ($CAT_ID)"
            fi

            FINAL_CATEGORIES="$FINAL_CATEGORIES,$CAT_ID"
          done

              # -----------------------------
              # SEARCH CATEGORY BY NAME
              # -----------------------------
              SEARCH_RESULT=$(curl -s $WP_AUTH \
                "${WP_URL}/wp-json/wp/v2/categories?search=$(echo $CAT | sed 's/ /%20/g')")

              CAT_ID=$(echo "$SEARCH_RESULT" | jq -r '.[0].id // empty')

              if [ -n "$CAT_ID" ]; then
                echo "Found category '$CAT' with ID $CAT_ID"
              else
                echo "Category not found → creating: $CAT"

                CREATE_RESULT=$(curl -s -X POST $WP_AUTH \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"$CAT\"}" \
                  "${WP_URL}/wp-json/wp/v2/categories")

                CAT_ID=$(echo "$CREATE_RESULT" | jq -r '.id')

                echo "Created category '$CAT' with ID $CAT_ID"
              fi

              FINAL_CATEGORIES="$FINAL_CATEGORIES,$CAT_ID"
            done

            FINAL_CATEGORIES=$(echo "$FINAL_CATEGORIES" | sed 's/^,//')

            # -----------------------------
            # SLUG (IDEMPOTENCY CHECK)
            # -----------------------------
            BASENAME=$(basename "$file" .txt)
            SLUG=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

            echo "Slug: $SLUG"

            EXISTING=$(curl -s $WP_AUTH \
              "${WP_URL}/wp-json/wp/v2/posts?slug=${SLUG}")

            if echo "$EXISTING" | grep -q "\"id\""; then
              echo "Already published → skipping"
              continue
            fi

            echo "Publishing new post..."

            # -----------------------------
            # CONTENT BUILD
            # -----------------------------
            CONTENT=$(tail -n +3 "$file" | jq -Rs .)

            # -----------------------------
            # POST TO WORDPRESS
            # -----------------------------
            curl -s -X POST $WP_AUTH \
              -H "Content-Type: application/json" \
              -d "{
                \"title\": \"${TITLE}\",
                \"slug\": \"${SLUG}\",
                \"status\": \"publish\",
                \"categories\": [${FINAL_CATEGORIES}],
                \"content\": ${CONTENT}
              }" \
              "${WP_URL}/wp-json/wp/v2/posts"

            echo "Published: $SLUG"

          done

      - name: Done
        run: echo "Publishing complete"

    env:
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
