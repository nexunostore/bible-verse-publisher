name: Publish Bible Stories

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: bible-story-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Publish stories (idempotent via WP slug check)
        run: |
          set -e

          echo "Scanning Bible_Stories folder..."

          find Bible_Stories -type f -name "*.txt" | while read -r file; do

            echo "--------------------------------------"
            echo "Processing: $file"

            TITLE=$(head -n 1 "$file" | tr -d '\r')

            CATEGORY_LINE=$(sed -n '2p' "$file" | sed 's/categories://I')
            CATEGORIES=$(echo "$CATEGORY_LINE" | tr -d ' ')

            BASENAME=$(basename "$file" .txt)
            SLUG=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

            echo "Slug: $SLUG"

            # -----------------------------
            # CHECK WORDPRESS (PREVENT DUPES)
            # -----------------------------
            EXISTING=$(curl -s -u "${WP_USERNAME}:${WP_PASSWORD}" \
              "${WP_URL}/wp-json/wp/v2/posts?slug=${SLUG}")

            if echo "$EXISTING" | grep -q "\"id\""; then
              echo "Already published → skipping"
              continue
            fi

            echo "Publishing new post..."

            # -----------------------------
            # BUILD CONTENT
            # -----------------------------
            CONTENT=$(tail -n +3 "$file" \
              | awk '
                  BEGIN { paragraph="" }
                  {
                    if (NF == 0) {
                      if (paragraph != "") {
                        print "<p>" paragraph "</p>"
                        paragraph=""
                      }
                    } else {
                      if (paragraph == "") paragraph=$0
                      else paragraph=paragraph " " $0
                    }
                  }
                  END {
                    if (paragraph != "") print "<p>" paragraph "</p>"
                  }
                ' \
              | sed 's/^## \(.*\)$/<h2>\1<\/h2>/' \
              | sed 's/^# \(.*\)$/<h1>\1<\/h1>/' \
              | jq -Rs .)

            # -----------------------------
            # POST TO WORDPRESS
            # -----------------------------
            curl -s -X POST \
              -u "${WP_USERNAME}:${WP_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d "{
                \"title\": \"${TITLE}\",
                \"slug\": \"${SLUG}\",
                \"status\": \"publish\",
                \"categories\": [${CATEGORIES}],
                \"content\": ${CONTENT}
              }" \
              "${WP_URL}/wp-json/wp/v2/posts"

            echo "Published: $SLUG"

          done

      - name: Done
        run: echo "Publishing complete"

    env:
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
