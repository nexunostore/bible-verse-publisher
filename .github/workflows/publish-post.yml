name: Publish Post

on:
  push:
    paths:
      - "posts/**/*.txt"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Find newest post file
        id: findfile
        run: |
          FILE=$(ls -t posts/*.txt | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Prepare post
        id: prep
        run: |
          FILE="${{ steps.findfile.outputs.file }}"

          TITLE=$(head -n 1 "$FILE")

          # Convert text to HTML paragraphs
          CONTENT=$(tail -n +2 "$FILE" \
            | sed '/^$/d' \
            | sed 's/^## \(.*\)$/<h2>\1<\/h2>/' \
            | sed 's/^# \(.*\)$/<h1>\1<\/h1>/' \
            | sed 's/^/<p>/' \
            | sed 's/$/<\/p>/' \
            | jq -Rs .)

          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')

          echo "{\"title\":\"$TITLE\",\"slug\":\"$SLUG\",\"status\":\"publish\",\"content\":$CONTENT}" > post.json


      - name: Publish all new posts
        run: |
          for FILE in posts/*.txt; do
            TITLE=$(head -n 1 "$FILE")
            CONTENT=$(tail -n +2 "$FILE" | jq -Rs .)
            SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')

            echo "Checking if '$SLUG' already exists on WordPress..."

            EXISTS=$(curl -s \
              -u "${WP_USERNAME}:${WP_PASSWORD}" \
              "${WP_URL}/wp-json/wp/v2/posts?slug=${SLUG}")

            if echo "$EXISTS" | grep -q "\"slug\":\"$SLUG\""; then
              echo "Post '$SLUG' already exists. Skipping."
              continue
            fi

            echo "Publishing new post: $TITLE"

            curl -X POST \
              -u "${WP_USERNAME}:${WP_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"$TITLE\",\"slug\":\"$SLUG\",\"status\":\"publish\",\"content\":$CONTENT}" \
              "${WP_URL}/wp-json/wp/v2/posts"
          done

        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
