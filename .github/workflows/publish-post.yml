name: Publish Chapter

on:
  workflow_dispatch:
    inputs:
      book:
        description: "Enter book folder name (e.g., 1_John, Colossians, Apocrypha/Baruch)"
        required: true
        type: string

      chapter:
        description: "Enter chapter number (e.g., 1, 2, 3)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build file path
        id: path
        run: |
          BOOK="${{ github.event.inputs.book }}"
          CHAPTER="${{ github.event.inputs.chapter }}"

          FILE="Daily_Chapter_Review/$BOOK/${BOOK}_SG_Chapter_${CHAPTER}.txt"

          if [ ! -f "$FILE" ]; then
            echo "File not found: $FILE"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Prepare content
        id: prep
        run: |
          FILE="${{ steps.path.outputs.file }}"

          TITLE=$(head -n 1 "$FILE")
          CATEGORY_LINE=$(sed -n '2p' "$FILE" | sed 's/categories://I')
          CATEGORIES=$(echo "$CATEGORY_LINE" | tr -d ' ')

          CONTENT=$(tail -n +3 "$FILE" | jq -Rs .)

          BASENAME=$(basename "$FILE" .txt)
          SLUG=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

          echo "{\"title\":\"$TITLE\",\"slug\":\"$SLUG\",\"status\":\"publish\",\"categories\":[$CATEGORIES],\"content\":$CONTENT}" > post.json

      - name: Publish
        run: |
          curl -X POST \
            -u "${WP_USERNAME}:${WP_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d @post.json \
            "${WP_URL}/wp-json/wp/v2/posts"
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
