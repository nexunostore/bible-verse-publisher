name: "Publish Post"

on:
  push:
    branches: [main]
    paths:
      - "posts/*.txt"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Find newest post file
        id: findfile
        run: |
          FILE=$(ls -t posts/*.txt | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Prepare post
        id: prep
        run: |
          FILE="${{ steps.findfile.outputs.file }}"

          if [ ! -f "$FILE" ]; then
            echo "No post file found."
            exit 1
          fi

          TITLE=$(head -n 1 "$FILE")
          CONTENT=$(tail -n +2 "$FILE" | jq -Rs .)

          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')

          echo "{\"title\":\"$TITLE\",\"slug\":\"$SLUG\",\"status\":\"publish\",\"content\":$CONTENT}" > post.json

      - name: Publish to WordPress
        run: |
          curl -X POST \
            -u "${WP_USER}:${WP_APP_PASS}" \
            -H "Content-Type: application/json" \
            -d @post.json \
            "${WP_URL}/wp-json/wp/v2/posts"
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
