name: Generate Verse File (v2)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      reference:
        description: "Enter verse (e.g., John 3:16)"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Parse reference
        id: parse
        run: |
          REF="${{ github.event.inputs.reference }}"
          BOOK=$(echo "$REF" | awk '{print $1}')
          CHAPTER=$(echo "$REF" | cut -d':' -f1 | awk '{print $2}')
          VERSE=$(echo "$REF" | cut -d':' -f2)
          echo "book=$BOOK" >> $GITHUB_OUTPUT
          echo "chapter=$CHAPTER" >> $GITHUB_OUTPUT
          echo "verse=$VERSE" >> $GITHUB_OUTPUT

      - name: Fetch verse text
        id: fetch
        run: |
          REF="${{ github.event.inputs.reference }}"
          DATA=$(curl -s "https://bible-api.com/${REF// /+}")
          TEXT=$(echo "$DATA" | jq -r '.text' | sed 's/"/\\"/g')
          echo "text=$TEXT" >> $GITHUB_OUTPUT

      - name: Generate meaning using OpenAI
        id: meaning
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT="Provide a clear, doctrinally sound Christian explanation of the meaning of this Bible verse: ${{ github.event.inputs.reference }} — ${{ steps.fetch.outputs.text }}. Write 4–6 sentences."

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [{\"role\": \"user\", \"content\": \"$PROMPT\"}]
            }")

          MEANING=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' | sed 's/"/\\"/g')
          echo "meaning=$MEANING" >> $GITHUB_OUTPUT

      - name: Generate YAML file
        run: |
          BOOK_LOWER=$(echo "${{ steps.parse.outputs.book }}" | tr '[:upper:]' '[:lower:]')
          FILE="verses/${BOOK_LOWER}-${{ steps.parse.outputs.chapter }}-${{ steps.parse.outputs.verse }}.yaml"

          mkdir -p verses


          echo "book: ${{ steps.parse.outputs.book }}" > "$FILE"
          echo "book_order: 43" >> "$FILE"
          echo "reference: ${{ github.event.inputs.reference }}" >> "$FILE"
          echo "verse: \"${{ steps.fetch.outputs.text }}\"" >> "$FILE"
          echo "meaning: >" >> "$FILE"
          echo "  ${{ steps.meaning.outputs.meaning }}" >> "$FILE"
          echo "cross_refs:" >> "$FILE"
          echo "  - book: Romans" >> "$FILE"
          echo "    chapter: 5" >> "$FILE"
          echo "    verse: 8" >> "$FILE"
          echo "    note: God's love demonstrated." >> "$FILE"
          echo "tags:" >> "$FILE"
          echo "  - Love" >> "$FILE"
          echo "  - Salvation" >> "$FILE"
          echo "  - ${{ steps.parse.outputs.book }}" >> "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add verses/
          git commit -m "Added verse: ${{ github.event.inputs.reference }}"
          git push
