name: Generate Bible Verse

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      reference:
        description: "Bible verse reference (e.g., Acts 1:1)"
        required: true
        type: string

      verse:
        description: "Enter the full verse text exactly as you want it to appear."
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sanitize and parse reference
        id: parse
        run: |
          REF=$(echo "${{ github.event.inputs.reference }}" \
            | tr -d '\r' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | sed 's/ / /g')

          BOOK=$(echo "$REF" | sed 's/ [0-9].*//')
          CHAPTER=$(echo "$REF" | sed 's/.* \([0-9][0-9]*\):.*/\1/')
          VERSE_NUM=$(echo "$REF" | sed 's/.*:[ ]*\([0-9][0-9]*\).*/\1/')

          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "book=$BOOK" >> $GITHUB_OUTPUT
          echo "chapter=$CHAPTER" >> $GITHUB_OUTPUT
          echo "verse_num=$VERSE_NUM" >> $GITHUB_OUTPUT

      - name: Use provided verse text
        id: verse_text
        run: echo "text=${{ github.event.inputs.verse }}" >> $GITHUB_OUTPUT

      - name: Load ALL cross references
        id: cross
        run: |
          REF="${{ steps.parse.outputs.ref }}"
          DATA=$(cat data/bible_crossrefs_final.json)

          LIST=$(echo "$DATA" | jq -r --arg ref "$REF" '.[$ref] // [] | .[]')

          echo "list=$LIST" >> $GITHUB_OUTPUT

      - name: Generate meaning using OpenAI
        id: meaning
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          sanitize() {
            echo "$1" \
              | sed 's/"/\\"/g' \
              | sed "s/’/'/g" \
              | sed "s/‘/'/g" \
              | sed 's/“/"/g' \
              | sed 's/”/"/g' \
              | tr '\n' ' '
          }

          REF="${{ steps.parse.outputs.ref }}"

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Provide a doctrinally sound explanation of the meaning of $REF in 3-5 sentences.\"
              }]
            }")

          RAW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          SAFE=$(sanitize "$RAW")

          echo "meaning=$SAFE" >> $GITHUB_OUTPUT

      - name: Generate notes for ALL cross references
        id: notes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          sanitize() {
            echo "$1" \
              | sed 's/"/\\"/g' \
              | sed "s/’/'/g" \
              | sed "s/‘/'/g" \
              | sed 's/“/"/g' \
              | sed 's/”/"/g' \
              | tr '\n' ' '
          }

          NOTES=""
          while IFS= read -r REF; do
            [ -z "$REF" ] && continue

            RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -d "{
                \"model\": \"gpt-4o-mini\",
                \"messages\": [{
                  \"role\": \"user\",
                  \"content\": \"Provide a one-sentence theological note explaining why this verse is a cross-reference: $REF\"
                }]
              }")

            RAW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
            SAFE=$(sanitize "$RAW")

            NOTES="$NOTES$REF|$SAFE\n"
          done <<< "${{ steps.cross.outputs.list }}"

          echo -e "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Write YAML output (unlimited cross refs)
        run: |
          sanitize() {
            echo "$1" \
              | sed 's/"/\\"/g' \
              | sed "s/’/'/g" \
              | sed "s/‘/'/g" \
              | sed 's/“/"/g' \
              | sed 's/”/"/g' \
              | tr '\n' ' '
          }

          BOOK="${{ steps.parse.outputs.book }}"
          CHAPTER="${{ steps.parse.outputs.chapter }}"
          VERSE_NUM="${{ steps.parse.outputs.verse_num }}"
          LBOOK=$(echo "$BOOK" | tr '[:upper:]' '[:lower:]')
          DATE=$(date +%Y-%m-%d)
          FILE="verses/$DATE-$LBOOK-$CHAPTER-$VERSE_NUM.yaml"

          mkdir -p verses

          SAFE_MEANING=$(sanitize "${{ steps.meaning.outputs.meaning }}")

          echo "book: $BOOK" > "$FILE"
          echo "book_order: 0" >> "$FILE"
          echo "group: unknown" >> "$FILE"
          echo "reference: \"${{ steps.parse.outputs.ref }}\"" >> "$FILE"
          echo "verse: >" >> "$FILE"
          echo "  ${{ steps.verse_text.outputs.text }}" >> "$FILE"
          echo "meaning: >" >> "$FILE"
          echo "  $SAFE_MEANING" >> "$FILE"
          echo "cross_refs:" >> "$FILE"

          while IFS= read -r LINE; do
            REF=$(echo "$LINE" | cut -d '|' -f 1)
            NOTE=$(echo "$LINE" | cut -d '|' -f 2)

            [ -z "$REF" ] && continue

            BOOK=$(echo "$REF" | sed 's/ [0-9].*//')
            CH=$(echo "$REF" | sed 's/.* \([0-9][0-9]*\):.*/\1/')
            VS=$(echo "$REF" | sed 's/.*:[ ]*\([0-9][0-9]*\).*/\1/')

            echo "  - book: $BOOK" >> "$FILE"
            echo "    chapter: $CH" >> "$FILE"
            echo "    verse: $VS" >> "$FILE"
            echo "    note: \"$NOTE\"" >> "$FILE"

          done <<< "${{ steps.notes.outputs.notes }}"

      - name: Commit verse file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add verses
          git commit -m "Generated verse ${{ steps.parse.outputs.ref }}" || echo "No changes"
          git push
