name: Generate Bible Verse

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      reference:
        description: "Bible verse reference (e.g., Acts 1:1)"
        required: true
        type: string

      verse:
        description: "Enter the full verse text exactly as you want it to appear."
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_PASSWORD: ${{ secrets.WP_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sanitize and parse reference
        id: parse
        run: |
          # Collapse ALL whitespace runs (regular + non-breaking) to a single
          # regular space, then trim. This is the key fix for cross-ref
          # lookups silently failing on double spaces / stray characters.
          REF=$(echo "${{ github.event.inputs.reference }}" \
            | tr -d '\r' \
            | sed 's/\xc2\xa0/ /g' \
            | tr -s '[:space:]' ' ' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          BOOK=$(echo "$REF" | sed 's/ [0-9].*//')
          CHAPTER=$(echo "$REF" | sed 's/.* \([0-9][0-9]*\):.*/\1/')
          VERSE_NUM=$(echo "$REF" | sed 's/.*:[ ]*\([0-9][0-9]*\).*/\1/')

          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "book=$BOOK" >> $GITHUB_OUTPUT
          echo "chapter=$CHAPTER" >> $GITHUB_OUTPUT
          echo "verse_num=$VERSE_NUM" >> $GITHUB_OUTPUT

      - name: Use provided verse text
        id: verse_text
        run: echo "text=${{ github.event.inputs.verse }}" >> $GITHUB_OUTPUT

      - name: Generate meaning using OpenAI
        id: meaning
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          sanitize() {
            echo "$1" \
              | sed "s/’/'/g" \
              | sed "s/‘/'/g" \
              | sed 's/“/"/g' \
              | sed 's/”/"/g' \
              | sed 's/"/\\"/g' \
              | tr '\n' ' '
          }

          REF="${{ steps.parse.outputs.ref }}"

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Provide a doctrinally sound explanation of the meaning of $REF in 3-5 sentences.\"
              }]
            }")

          RAW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          SAFE=$(sanitize "$RAW")

          echo "meaning=$SAFE" >> $GITHUB_OUTPUT

      - name: Write YAML output (unlimited cross refs, inline notes)
        id: write_yaml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          sanitize() {
            echo "$1" \
              | sed "s/’/'/g" \
              | sed "s/‘/'/g" \
              | sed 's/“/"/g' \
              | sed 's/”/"/g' \
              | sed 's/"/\\"/g' \
              | tr '\n' ' '
          }

          REF="${{ steps.parse.outputs.ref }}"
          BOOK="${{ steps.parse.outputs.book }}"
          CHAPTER="${{ steps.parse.outputs.chapter }}"
          VERSE_NUM="${{ steps.parse.outputs.verse_num }}"
          LBOOK=$(echo "$BOOK" | tr '[:upper:]' '[:lower:]')
          DATE=$(date +%Y-%m-%d)
          FILE="verses/$DATE-$LBOOK-$CHAPTER-$VERSE_NUM.yaml"

          mkdir -p verses

          SAFE_MEANING=$(sanitize "${{ steps.meaning.outputs.meaning }}")

          echo "book: $BOOK" > "$FILE"
          echo "book_order: 0" >> "$FILE"
          echo "group: unknown" >> "$FILE"
          echo "reference: \"$REF\"" >> "$FILE"
          echo "verse: >" >> "$FILE"
          echo "  ${{ steps.verse_text.outputs.text }}" >> "$FILE"
          echo "meaning: >" >> "$FILE"
          echo "  $SAFE_MEANING" >> "$FILE"
          echo "cross_refs:" >> "$FILE"

          DATA=$(cat data/bible_crossrefs_final.json)

          # Debug: confirms whether the lookup key actually exists in the
          # data file, instead of silently falling back to an empty list.
          FOUND=$(echo "$DATA" | jq --arg ref "$REF" 'has($ref)')
          echo "Cross-ref lookup key: [$REF] — present in data file: $FOUND"
          if [ "$FOUND" != "true" ]; then
            echo "::warning::No cross-reference entry found for '$REF'. Check data/bible_crossrefs_final.json for an exact key match (spacing/capitalization)."
          fi

          LIST=$(echo "$DATA" | jq -r --arg ref "$REF" '.[$ref] // [] | .[]')

          while IFS= read -r CREF; do
            [ -z "$CREF" ] && continue

            NOTE_RESP=$(curl -s https://api.openai.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -d "{
                \"model\": \"gpt-4o-mini\",
                \"messages\": [{
                  \"role\": \"user\",
                  \"content\": \"Provide a one-sentence theological note explaining why this verse is a cross-reference: $CREF\"
                }]
              }")

            NOTE_RAW=$(echo "$NOTE_RESP" | jq -r '.choices[0].message.content')
            NOTE_SAFE=$(sanitize "$NOTE_RAW")

            CBOOK=$(echo "$CREF" | sed 's/ [0-9].*//')
            CCH=$(echo "$CREF" | sed 's/.* \([0-9][0-9]*\):.*/\1/')
            CVS=$(echo "$CREF" | sed 's/.*:[ ]*\([0-9][0-9]*\).*/\1/')

            echo "  - book: $CBOOK" >> "$FILE"
            echo "    chapter: $CCH" >> "$FILE"
            echo "    verse: $CVS" >> "$FILE"
            echo "    note: \"$NOTE_SAFE\"" >> "$FILE"

          done <<< "$LIST"

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Commit verse file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add verses
          git commit -m "Generated verse ${{ steps.parse.outputs.ref }}" || echo "No changes"
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install publish dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Publish this verse to WordPress
        run: |
          python "${GITHUB_WORKSPACE}/scripts/publish.py" "${{ steps.write_yaml.outputs.file }}"