name: Publish Verse

on:
  push:
    paths:
      - "verses/*.yaml"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Publish verses
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: |
          for file in $(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^verses/'); do
            python scripts/publish.py "$file"
          done
