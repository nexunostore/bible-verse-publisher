name: Publish Verse

on:
  push:
    paths:
      - "verses/*.yaml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml python-slugify

      - name: Publish verses
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run detected — publishing ALL verse files"
            for file in verses/*.yaml; do
              echo "Publishing $file"
              python scripts/publish.py "$file"
            done
          else
            BEFORE_SHA=$(git rev-parse ${{ github.event.before }} 2>/dev/null || echo HEAD~1)
            echo "Auto run detected — publishing changed verse files"
            CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" ${{ github.sha }} | grep '^verses/' || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "No changed verse files detected"
              exit 0
            fi
            for file in $CHANGED_FILES; do
              echo "Publishing $file"
              python scripts/publish.py "$file"
            done
          fi
