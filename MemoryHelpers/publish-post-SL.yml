name: Publish Chapter (Scripture Learning)

on:
  workflow_dispatch:
    inputs:
      book:
        description: "Enter book folder name (e.g., 1_John, Colossians, Apocrypha/Baruch)"
        required: true
        type: string

      chapter:
        description: "Enter chapter number (e.g., 1, 2, 3)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      WP_URL: "https://scripturelearning.org"
      WP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
      WP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build file path
        id: path
        run: |
          BOOK="${{ github.event.inputs.book }}"
          CHAPTER="${{ github.event.inputs.chapter }}"

          FILE="Daily_Chapter_Review/$BOOK/${BOOK}_SG_Chapter_${CHAPTER}.txt"

          if [ ! -f "$FILE" ]; then
            echo "File not found: $FILE"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Prepare content
        id: prep
        run: |
          set -e

          FILE="${{ steps.path.outputs.file }}"
          WP_AUTH="${WP_USERNAME}:${WP_PASSWORD}"

          TITLE=$(head -n 1 "$FILE")

          # -----------------------------
          # CATEGORY RESOLUTION (by name, not raw numeric IDs)
          # Line 2 is "categories: Name One, Name Two" — look each up by
          # exact name via the WP REST API, creating it if it doesn't
          # exist yet, same behavior as publish-bible-stories-SL.yml.
          # -----------------------------
          CATEGORY_LINE=$(sed -n '2p' "$FILE" | sed 's/categories://I')
          IFS=',' read -ra CAT_ARRAY <<< "$CATEGORY_LINE"

          FINAL_CATEGORIES=""

          for CAT in "${CAT_ARRAY[@]}"; do
            CAT=$(echo "$CAT" | xargs)               # trim surrounding whitespace
            CAT=$(echo "$CAT" | sed 's/[[:space:]]\+/ /g')  # collapse internal multi-spaces
            [ -z "$CAT" ] && continue

            echo "Processing category: '$CAT'"

            SEARCH=$(curl -s -u "$WP_AUTH" \
              "${WP_URL}/wp-json/wp/v2/categories?search=$(printf '%s' "$CAT" | sed 's/ /%20/g')")

            CAT_ID=$(echo "$SEARCH" | jq -r --arg name "$CAT" '
              map(select(.name == $name)) | .[0].id // empty
            ')

            if [ -z "$CAT_ID" ]; then
              echo "Creating category: $CAT"
              CREATE_PAYLOAD=$(jq -n --arg name "$CAT" '{name: $name}')

              CREATE=$(curl -s -X POST -u "$WP_AUTH" \
                -H "Content-Type: application/json" \
                -d "$CREATE_PAYLOAD" \
                "${WP_URL}/wp-json/wp/v2/categories")

              CAT_ID=$(echo "$CREATE" | jq -r '.id')

              if [ -z "$CAT_ID" ] || [ "$CAT_ID" = "null" ]; then
                echo "ERROR creating category '$CAT' — raw response:"
                echo "$CREATE"
                echo "Skipping this category; post will publish without it."
                CAT_ID=""
              else
                echo "Created category ID: $CAT_ID"
              fi
            else
              echo "Found category ID: $CAT_ID"
            fi

            [ -n "$CAT_ID" ] && FINAL_CATEGORIES="$FINAL_CATEGORIES,$CAT_ID"
          done

          FINAL_CATEGORIES=$(echo "$FINAL_CATEGORIES" | sed 's/^,//')
          echo "Final categories: $FINAL_CATEGORIES"

          # Build proper HTML paragraphs. Headings and bold/italic
          # markdown are converted FIRST, on raw lines — converting them
          # after the awk paragraph-wrapping step (as this used to do)
          # meant a heading line had already become "<p>## Title</p>" by
          # the time the heading regex ran, which no longer matches "^##"
          # at all, so headings were silently never converting.
          CONTENT=$(tail -n +3 "$FILE" \
            | sed 's/^## \(.*\)$/<h2>\1<\/h2>/' \
            | sed 's/^# \(.*\)$/<h1>\1<\/h1>/' \
            | sed 's/\*\*\([^*]\+\)\*\*/<strong>\1<\/strong>/g' \
            | sed 's/\*\([^*]\+\)\*/<em>\1<\/em>/g' \
            | awk '
                BEGIN { paragraph="" }
                {
                  if (NF == 0) {
                    if (paragraph != "") {
                      print "<p>" paragraph "</p>"
                      paragraph=""
                    }
                  } else if ($0 ~ /^<h[12]>/) {
                    # Already-converted heading line — flush any pending
                    # paragraph and print it standalone, not wrapped in
                    # <p>, since a <p> cannot contain a heading.
                    if (paragraph != "") {
                      print "<p>" paragraph "</p>"
                      paragraph=""
                    }
                    print $0
                  } else {
                    if (paragraph == "") {
                      paragraph=$0
                    } else {
                      paragraph=paragraph " " $0
                    }
                  }
                }
                END {
                  if (paragraph != "") {
                    print "<p>" paragraph "</p>"
                  }
                }
              ' \
            | jq -Rs .)

          BASENAME=$(basename "$FILE" .txt)
          SLUG=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')

          # Built with jq -n instead of raw string interpolation for the
          # title — a title containing a quote character would otherwise
          # break this JSON. CONTENT is already jq-encoded via jq -Rs
          # above, so it's already JSON-safe as-is.
          jq -n \
            --arg title "$TITLE" \
            --arg slug "$SLUG" \
            --argjson categories "[$FINAL_CATEGORIES]" \
            --argjson content "$CONTENT" \
            '{title: $title, slug: $slug, status: "publish", categories: $categories, content: $content}' \
            > post.json

      - name: Publish
        run: |
          curl -X POST \
            -u "${WP_USERNAME}:${WP_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d @post.json \
            "${WP_URL}/wp-json/wp/v2/posts"
