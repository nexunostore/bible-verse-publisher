book: Acts
book_order: 44
reference: "Acts 1:1"
verse: >
  In my first book I told you, Theophilus, about everything Jesus began to do and teach
meaning: >
  Acts 1:1 serves as the introduction to the Book of Acts, authored by Luke, who also wrote the Gospel of Luke. In this verse, Luke refers to his previous work, indicating that it was a comprehensive account of all that Jesus began to do and teach. This suggests a continuity between the teachings of Jesus during His earthly ministry and the actions of His followers following His ascension. The phrase all that Jesus began to do and teach underscores the ongoing mission of the Church, as it continues to spread the Gospel and live out the teachings of Christ through the empowerment of the Holy Spirit. Thus, Acts sets the stage for understanding the early Church's role in fulfilling Jesus' commission to make disciples of all nations.
cross_refs:
