book: Revelation 
book_order: 66
reference: Revelation  3:14
verse: And unto the angel of the church of the Laodiceans write; These things saith the Amen, the faithful and true witness, the beginning of the creation of God;
meaning: >
  Jesus commands John to write to the church in Laodicea, a wealthy and self-reliant city whose church reflected many of the spiritual challenges seen throughout history. 
  He identifies Himself as the Amen, the faithful and true witness, and the beginning of God's creation, emphasizing that He is God's perfect revelation, 
  always speaks the truth, and is the Creator and sovereign over all things. Because of His authority and trustworthiness, 
  the Laodicean church was called to heed His message and respond in faithful obedience.
cross_refs:
  - book: Isaiah
    chapter: 65
    verse: 16
    note: God is called "the God of truth" (literally "the God of Amen"), emphasizing His faithfulness.
  - book: 2 Corinthians
    chapter: 1
    verse: 20
    note: All of God's promises find their "Yes" and "Amen" in Christ.
  - book: John
    chapter: 1
    verse: 1-3
    note: All things were created through Christ.
  - book: Matthew
    chapter: 28
    verse: 18
    note: "All authority in heaven and on earth has been given to me."
  - book: Philippians
    chapter: 2
    verse: 9-11
    note: Every knee will bow and every tongue confess that Jesus Christ is Lord. Christ has absolute authority, making His message to the churches binding.

