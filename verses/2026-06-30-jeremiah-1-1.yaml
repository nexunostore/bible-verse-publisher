book: Jeremiah
book_order: 24
group: major-prophets
reference: "Jeremiah 1:1"
verse: >
  These are the words of Jeremiah son of Hilkiah, one of the priests from the town of Anathoth in the land of Benjamin.
meaning: >
  Jeremiah 1:1 introduces the prophetic career of Jeremiah, a prophet called by God to deliver messages to the people of Judah during a tumultuous period. The verse establishes Jeremiah's lineage, identifying him as the son of Hilkiah, which underscores the importance of his prophetic calling within the context of Israel's history. The mention of the priestly city of Anathoth indicates his connection to a priestly heritage, linking his role as prophet to the spiritual leadership of the nation. This verse sets the stage for understanding Jeremiah's mission, emphasizing God's sovereign choice and the seriousness of the prophetic message he would deliver to warn, call to repentance, and ultimately reveal God's judgment and hope for restoration.
cross_refs:
  - book: Ezekiel
    chapter: 1
    verse: 3
    note: "Ezekiel 1:3 serves as a cross-reference to highlight the prophetic calling and divine commissioning of the prophet, emphasizing how God's revelation and presence transcend earthly limitations, which parallels the commissioning of other prophets in scripture, such as Isaiah and Jeremiah."
  - book: Isaiah
    chapter: 2
    verse: 1
    note: "Isaiah 2:1 serves as a cross-reference because it prophesies the establishment of God's kingdom and the coming of His reign, themes that resonate throughout both the Old and New Testaments, particularly in teachings about the fulfillment of God's plans for humanity."
  - book: 2 Chronicles
    chapter: 36
    verse: 21
    note: "2 Chronicles 36:21 serves as a cross-reference because it highlights the fulfillment of the prophecy of the Babylonian exile, which demonstrates God's sovereignty and the necessity of obedience to His covenant, linking it to themes found in Jeremiah 25:11-12 regarding the desolation of the land and the restoration promise."
  - book: Jeremiah
    chapter: 11
    verse: 21
    note: "Jeremiah 11:21, which speaks of the threats against the inhabitants of Anathoth for their opposition to God's prophetic message, serves as a cross-reference to reinforce the theme of prophetic rejection and the consequences of turning away from divine truth, mirroring similar sentiments found in the New Testament concerning the persecution of Christ and His message."
