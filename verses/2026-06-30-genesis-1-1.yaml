    note: "Psalm 124:8, which declares, Our help is in the name of the Lord, who made heaven and earth, serves as a theological cross-reference by affirming the sovereignty and faithful assistance of God in the face of peril, echoing themes found throughout Scripture that highlight God's role as the ultimate protector and sustainer of His people."
  - book: Jeremiah
