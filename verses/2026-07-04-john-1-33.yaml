book: John
book_order: 43
group: gospels
reference: "John 1:33"
verse: >
  And I knew him not: but he that sent me to baptize with water, the same said unto me, Upon whom thou shalt see the Spirit descending, and remaining on him, the same is he which baptizeth with the Holy Ghost.
meaning: >
  In John 1:33, John the Baptist explains that he did not recognize Jesus as the Messiah until he witnessed the Spirit descending like a dove and remaining on Him. This signifies the divine confirmation of Jesus' identity and mission as the Son of God. The passage underscores the importance of divine revelation in recognizing Jesus’ true nature, and highlights the role of the Holy Spirit in affirming His public ministry. Ultimately, this verse emphasizes the relationship between the Father, the Spirit, and the Son, as well as the significance of Jesus' baptism in inaugurating His ministry and fulfilling God's redemptive plan.
