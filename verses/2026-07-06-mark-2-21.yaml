    verse: 16
    note: "Matthew 9:16, which states that no one puts a piece of unshrunk cloth on an old garment because the patch will tear away from the garment, serves as a cross-reference to illustrate the transformative nature of Christ's message, contrasting the new covenant of grace with the old covenant of laws and traditions, thus highlighting the necessity of spiritual renewal and adaptation in the Christian faith. "
