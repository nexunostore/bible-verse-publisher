book: Mark
book_order: 0
group: unknown
reference: "Mark 2:21"
verse: >
  No man also seweth a piece of new cloth on an old garment: else the new piece that filled it up taketh away from the old, and the rent is made worse
meaning: >
  Mark 2:21 states, "No one sews a patch of unshrunk cloth on an old garment. Otherwise, the new piece will pull away from the old, making the tear worse." This verse illustrates the incompatibility of Jesus' new covenant teachings with the established religious practices of the Pharisees and the Jewish law. The unshrunk cloth symbolizes the fresh, transformative nature of Christ's message, which cannot simply be added onto existing traditions without causing discord. By emphasizing the need for a complete renewal rather than mere modification, this teaching underscores the radical nature of the Gospel and calls for a deeper internal change in response to God's grace. 
