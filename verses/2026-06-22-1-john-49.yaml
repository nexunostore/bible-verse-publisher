book: 1 John 4:9 
book_order: 62
reference: 1 John 4:9
verse: In this was manifested the love of God toward us, because that God sent his only begotten Son into the world, that we might live through him.
meaning: >
In this verse, John condenses profound truth by revealing that God’s love is not hidden but actively demonstrated through the sending of His only Son, Jesus. 
The term monogenēs (one and only) affirms that Jesus is not a created being but shares the exact same divine nature as the Father, 
having existed with Him from the beginning before coming into our world. 
This deliberate mission was designed for a specific purpose: so that we might live through Him. 
By believing in Jesus, believers receive not only the promise of eternal life but also experience an abundant, 
abiding fullness of life in the present, making Christ the ultimate proof and source of God’s love.
