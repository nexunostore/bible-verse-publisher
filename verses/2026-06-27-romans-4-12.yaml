book: Romans
book_order: 45
reference: "Romans 4:12"
verse: >
  And Abraham is also the spiritual father of those who have been circumcised, but only if they have the same kind of faith Abraham had before he was circumcised.
meaning: >
  Romans 4:12 states, “And the father of circumcision to them who are not of the circumcision only, but who also walk in the steps of that faith of our father Abraham, which he had being yet uncircumcised.” This verse emphasizes that Abraham is not only the father of the Jewish people (who bear the sign of circumcision) but also the spiritual father of all who share his faith, including Gentiles. The focus is on faith rather than ethnicity or adherence to the Law; it teaches that righteousness is credited to anyone who, like Abraham, believes in God’s promises. Therefore, the true marker of God’s covenant community extends beyond physical circumcision to include all individuals who exhibit a faith that mirrors that of Abraham. This underscores the inclusivity of the Gospel and the foundational principle that faith is the avenue through which one is justified before God.
