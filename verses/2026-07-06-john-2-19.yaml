    note: "Acts 2:32, which declares that \"God has raised this Jesus to life, and we are all witnesses of the fact,\" serves as a cross-reference emphasizing the resurrection as a foundational truth of Christian faith, linking to other scriptural affirmations of Jesus' victory over death and His divine authority. "
