    note: "1 Peter 3:18 serves as a cross-reference because it encapsulates the central Christian doctrine of Christ's sacrificial atonement, highlighting His suffering for sins to bring believers to God, thereby linking to the greater narrative of redemption found throughout scripture. "
  - book: Matthew
    chapter: 27
    verse: 40
    note: "Matthew 27:40, where the bystanders challenge Jesus by taunting that if He is the Son of God, He should save Himself and come down from the cross, serves as a cross-reference to other scriptural themes such as the mockery of the Messiah in Psalm 22:7-8 and highlights the fulfillment of prophecy regarding the suffering servant, underscoring the paradox of salvation through apparent weakness and condemnation. "
