    note: "Ephesians 2:1, which states that we were dead in our trespasses and sins, serves as a cross-reference to the concept of spiritual death and the necessity of divine grace for salvation, echoing similar themes found in other scripture passages such as Romans 6:23 and Colossians 2:13. \n2 Corinthians 4:4"
