    note: "2 Corinthians 4:4 illustrates the spiritual blindness caused by the god of this age, which underscores the necessity of divine illumination through Christ, making it a cross-reference related to the theme of salvation and the power of the Gospel in contrast to worldly darkness, echoing messages found in passages such as John 12:40 and Ephesians 2:1-3. "
