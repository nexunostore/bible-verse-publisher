    note: "1 John 2:29 serves as a cross-reference because it emphasizes the assurance of righteousness in believers, reflecting the transformative power of God's nature within them, which resonates with the broader biblical theme of the relationship between faith in Christ and the manifestation of holy living as evidence of true believers. "
  - book: John
    chapter: 1
    verse: 51
    note: "John 1:51 serves as a cross-reference to Genesis 28:12, as both verses highlight the connection between heaven and earth through divine revelation, exemplified in Jesus' proclamation of angels ascending and descending, echoing Jacob's dream of the ladder. "
  - book: 1 John
    chapter: 3
