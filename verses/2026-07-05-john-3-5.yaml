    verse: 16
    note: "Mark 16:16, which states \"Whoever believes and is baptized will be saved, but whoever does not believe will be condemned,\" serves as a cross-reference to the central Christian themes of faith and salvation, emphasizing the necessity of both belief and baptism in the process of redemption. "
  - book: Matthew
    chapter: 28
    verse: 19
    note: "Matthew 28:19, where Jesus commands His disciples to \"go therefore and make disciples of all nations,\" serves as a cross-reference to the Great Commission, emphasizing the universal call to spread the Gospel and baptize believers in the name of the Father, Son, and Holy Spirit, thus reinforcing the Trinitarian nature of God's mission for humanity. "
  - book: Matthew
    chapter: 5
    verse: 20
    note: "Matthew 5:20 states that one's righteousness must exceed that of the Pharisees and teachers of the law to enter the Kingdom of Heaven, serving as a theological cross-reference to the idea that true righteousness stems from an inward transformation of the heart rather than mere external adherence to the law, a theme echoed throughout both the Old and New Testaments. "
  - book: 2 Corinthians
    chapter: 5
    verse: 17
    note: "2 Corinthians 5:17, which states that in Christ, a person becomes a \"new creation,\" serves as a cross-reference to the transformative power of salvation and regeneration, highlighting the radical change in identity and existence that occurs through faith in Jesus. "
