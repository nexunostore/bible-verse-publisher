    chapter: 4
    verse: 40
    note: "John 4:40, which speaks of Jesus staying with the Samaritans after they welcomed Him, serves as a cross-reference to highlight themes of acceptance, the expansion of the Gospel beyond ethnic and cultural boundaries, and the fulfillment of the Messianic mission to all people, as seen in passages like Matthew 28:19, which commands the disciples to make disciples of all nations."
