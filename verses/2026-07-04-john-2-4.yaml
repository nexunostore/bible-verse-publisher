book: John
book_order: 43
group: gospels
reference: "John 2:4"
verse: >
  Jesus saith unto her, Woman, what have I to do with thee? mine hour is not yet come.
meaning: >
  In John 2:4, Jesus responds to his mother, Mary, who has informed him that the wedding at Cana is out of wine, by saying, Woman, what does this have to do with me? My hour has not yet come. This statement underscores Jesus' awareness of his divine mission and the timing of its revelation. By addressing Mary as Woman, he emphasizes a shift from familial ties to his broader divine purpose. The phrase My hour has not yet come indicates that Jesus is aware that his public ministry and the full manifestation of his identity as the Messiah are to unfold according to God's divine timeline, suggesting a deep connection between the incident at Cana and the overarching plan of salvation. Thus, the verse reflects both Jesus' respect for Mary while also affirming his primary commitment to his heavenly Father's will.
