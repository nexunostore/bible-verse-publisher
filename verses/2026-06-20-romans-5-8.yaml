book: Romans
book_order: 45
reference: Romans 5:8
verse: But God commendeth his love toward us, in that, while we were yet sinners, Christ died for us.
meaning: >
  Paul reminds us that salvation is by faith alone, not works. God's love is demonstrated in that Christ died in our place while we were still sinners, 
  taking the punishment we deserved. Because of this, we can be confident in God's love and trust Him completely.
