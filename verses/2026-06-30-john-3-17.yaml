book: John
book_order: 43
group: gospels
reference: "John 3:17"
verse: >
  God sent his Son into the world not to judge the world, but to save the world through him.
meaning: >
  John 3:17 states, For God did not send His Son into the world to condemn the world, but that the world through Him might be saved. This verse emphasizes the primary mission of Jesus Christ: to bring salvation rather than condemnation. It reflects God's love and desire for reconciliation with humanity, highlighting that the focus of His redemptive plan is on offering grace and forgiveness, rather than judgment. Through faith in Christ, believers are given the opportunity to receive eternal life, demonstrating God’s intention for restoration and hope for all people.
