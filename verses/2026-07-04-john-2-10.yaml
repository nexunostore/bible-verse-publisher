    verse: 1
    note: "Proverbs 9:1, which states, "Wisdom has built her house; she has hewn her seven pillars," serves as a cross-reference to the New Testament's portrayal of Christ as the embodiment of divine wisdom, particularly in passages like 1 Corinthians 1:24, highlighting the connection between wisdom and the foundation of the faith."
  - book: Proverbs
    chapter: 9
    verse: 2
    note: "Proverbs 9:2, which speaks of wisdom preparing a feast, serves as a cross-reference to the New Testament's depiction of Christ as the embodiment of wisdom and the source of eternal life, particularly seen in the invitation to the Supper of the Lamb in Revelation 19:9."
  - book: Proverbs
    chapter: 9
    verse: 3
    note: "Proverbs 9:3, which invites the simple to come and partake in wisdom's feast, serves as a cross-reference to the New Testament notion of Christ as the embodiment of divine wisdom and the invitation to spiritual nourishment and understanding through Him (e.g., John 6:35)."
  - book: Proverbs
    chapter: 9
    verse: 4
    note: "Proverbs 9:4, which invites the simple to turn aside to gain wisdom, serves as a cross-reference to the call of Jesus in Matthew 11:28-30, where He invites the weary to find rest and learn from Him, highlighting the theme of divine wisdom and guidance offered to those seeking understanding and spiritual sustenance."
