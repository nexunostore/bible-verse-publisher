reference: John 3:16
verse: For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.
meaning: >
  Christianity is centered on God's love for humanity. God came in human form as Jesus Christ, who died for our sins so that everyone who believes
  in Him may receive eternal life instead of perishing. John 3:16 is the Bible's clearest summary of the gospel. It reveals that God demonstrated
  His love by giving His one and only Son, who shares the same divine nature as the Father. Salvation is a gift offered through faith in Jesus alone,
  while those who reject Him remain under condemnation.
