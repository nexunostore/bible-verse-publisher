reference: "Mark 2:18"
verse: >
   And the disciples of John and of the Pharisees used to fast: and they come and say unto him, Why do the disciples of John and of the Pharisees fast, but thy disciples fast not?
meaning: >
  In Mark 2:18, the question posed to Jesus about why His disciples do not fast reflects a misunderstanding of His ministry and the new covenant He was establishing. Fasting, a practice associated with mourning and seeking God, takes on a new significance in the presence of Christ, who represents the arrival of the Kingdom of God. Jesus responds by illustrating that the joy of His presence among them should lead to celebration, akin to a wedding feast. This passage emphasizes that the new life and relationship believers have in Christ bring a transformative joy that contrasts with the traditional practices of mourning, highlighting the shift from the old covenant to the new covenant fulfilled in Him. 
