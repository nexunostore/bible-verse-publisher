book: Luke 
book_order: 22
reference: Luke 22:20
verse: > 
	   After supper he took another cup of wine and said, This cup is the new covenant between God and his people, an agreement confirmed with my blood, 
       which is poured out as a sacrifice for you.
meaning: >
  Jesus institutes the New Covenant during the Last Supper, declaring that the cup of wine represents His blood which is poured out for you. 
  This profound statement fulfills the ancient prophecy of Jeremiah, marking a decisive shift from the Old Covenant sealed with animal sacrifices to a new, 
  eternal agreement sealed by Christ’s own sacrificial death. By offering His life as a ransom, Jesus provides complete forgiveness of sins and reconciles 
  humanity directly to God, promising an internal transformation where God’s laws are written on believers' hearts rather than on stone tablets. 
  As supported by parallel accounts in Matthew and 1 Corinthians, this act invites all followers to participate in this grace-filled relationship, 
  remembering that their redemption and eternal inheritance are secured not by their own works, but through the shed blood of the Messiah.
cross_refs:
  - book: Jeremiah
    chapter: 31
    verse: 31-34
    note: God promises to make a new covenant with Israel and Judah, forgiving their wickedness and remembering their sins no more.
  - book: Matthew
    chapter: 26
    verse: 27-28
    note: Drink from it, all of you. This is my blood of the covenant.
  - book: 1 Corinthians
    chapter: 11
    verse: 25
    note: This cup is the new covenant in my blood; do this, whenever you drink it, in remembrance of me.
  - book: Ephesians
    chapter: 1
    verse: 7
    note: In him we have redemption through his blood, the forgiveness of sins, in accordance with the riches of God’s grace.

