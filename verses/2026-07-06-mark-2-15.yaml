  - book: Luke
    chapter: 15
    verse: 1
    note: "Luke 15:1 serves as a cross-reference illustrating the inclusivity of Jesus' ministry, as it highlights His willingness to associate with sinners and tax collectors, thereby embodying the message of grace and repentance central to the Gospel. "
  - book: Luke
    chapter: 6
    verse: 17
    note: "Luke 6:17 serves as a cross-reference because it highlights the gathering of diverse followers around Jesus, illustrating His role as the unifying figure who brings together those seeking healing and teaching, reflecting the broader theme of redemption and inclusivity in the Gospel narrative. "
  - book: Matthew
    chapter: 21
    verse: 31
    note: "Matthew 21:31 highlights the theme of unexpected grace and the reversal of social and religious expectations, illustrating how those deemed least likely to inherit the kingdom—symbolized by the tax collectors and prostitutes—are welcomed into God's kingdom, thus embodying the core message of repentance and faith found throughout the Gospels. "
  - book: Matthew
    chapter: 21
    verse: 32
    note: "Matthew 21:32 serves as a cross-reference because it highlights the theme of repentance and the acceptance of sinners, illustrating how those marginalized by society often embrace God's message and grace more readily than the self-righteous, thereby reinforcing the New Testament's enduring call to humility and transformation. "
  - book: Matthew
