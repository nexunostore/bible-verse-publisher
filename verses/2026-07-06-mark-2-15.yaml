book: Mark
book_order: 0
group: unknown
reference: "Mark 2:15"
verse: >
  And it came to pass, that, as Jesus sat at meat in his house, many publicans and sinners sat also together with Jesus and his disciples: for there were many, and they followed him.
meaning: >
  Mark 2:15 recounts the calling of Levi, also known as Matthew, and highlights Jesus dining with tax collectors and sinners. This passage underscores Jesus' mission to reach those marginalized by society, demonstrating His willingness to associate with individuals deemed sinful or unworthy by religious leaders. By sharing a meal, which in Jewish culture signifies acceptance and fellowship, Jesus illustrates the inclusive nature of His kingdom. This act reveals that His message of grace and redemption is available to all, regardless of their past or social standing, emphasizing that He came to seek and save the lost. 
