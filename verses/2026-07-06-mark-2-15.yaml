    verse: 10
    note: "Matthew 9:10, which describes Jesus dining with tax collectors and sinners, serves as a cross-reference to illustrate His mission of grace and inclusion, emphasizing the theme of salvation extending to those marginalized by society and highlighting the transformative power of Christ's fellowship. "
