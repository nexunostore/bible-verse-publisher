book: Esther
book_order: 17
group: historical-books
reference: "Esther 1:4"
verse: >
  The celebration lasted 180 days — a tremendous display of the opulent wealth of his empire and the pomp and splendor of his majesty.
meaning: >
  Esther 1:4 describes King Xerxes displaying his wealth and glory during a lavish 180-day feast for the nobles and officials of his kingdom. This verse highlights the king's power and the opulence of his reign, serving as a backdrop for the events that unfold in the Book of Esther. It underscores the themes of pride and the human desire for recognition, contrasting with the humble yet courageous faith of Esther and her people later in the narrative. Ultimately, this verse sets the stage for God's providence in using seemingly trivial events and characters to accomplish His purposes for Israel amidst exile.
cross_refs:
  - book: Ezekiel
    chapter: 28
    verse: 5
    note: "Ezekiel 28:5, which speaks of the wisdom and trade of the prince of Tyre, serves as a cross-reference to biblical themes of pride and downfall, illustrating how human arrogance in the face of divine holiness ultimately leads to judgment, paralleling similar warnings found in scriptures such as Isaiah 14:12-15 and Revelation 18:7."
  - book: Daniel
    chapter: 4
    verse: 30
    note: "Daniel 4:30, where King Nebuchadnezzar proclaims the greatness of his kingdom, serves as a cross-reference to the theme of divine sovereignty over earthly rulers, illustrating how God can humble the proud and ultimately asserts His authority over all creation, a concept echoed in various biblical texts such as Isaiah 40:23-24 and James 4:6."
  - book: Daniel
    chapter: 4
    verse: 36
    note: "Daniel 4:36, which reflects God's sovereignty and authority in restoring Nebuchadnezzar's sanity and kingdom, serves as a cross-reference to Romans 13:1, emphasizing that all authority is established by God and highlights His dominion over human affairs and the divine plan for redemption through brokenness and repentance."
  - book: 1 Chronicles
    chapter: 29
    verse: 11
    note: "1 Chronicles 29:11 highlights God's ultimate sovereignty and majesty over all creation, serving as a cross-reference to other scriptures like Psalms 24:1, which similarly emphasizes God's ownership of the earth and everything in it, reinforcing the theological understanding of divine kingship and stewardship."
