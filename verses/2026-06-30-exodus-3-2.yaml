book: Exodus
book_order: 2
group: torah
reference: "Exodus 3:2"
verse: >
  There the angel of the Lord appeared to him in a blazing fire from the middle of a bush. Moses stared in amazement. Though the bush was engulfed in flames, it didn’t burn up.
meaning: >
  Exodus 3:2 describes the moment when Moses encounters the burning bush, where the bush is on fire but not consumed. This event signifies God's holiness and His ability to manifest divine presence in a way that is both awe-inspiring and life-giving. The burning bush symbolizes God's call to Moses and His desire to reveal His plans for the liberation of the Israelites. Furthermore, the subsequent instruction for Moses to take off his sandals underscores the sacredness of the occasion, emphasizing that encountering God requires reverence and acknowledgment of His holiness. This encounter sets the stage for God's covenant relationship with His people and His redemptive purposes in history.
cross_refs:
  - book: Acts
    chapter: 7
    verse: 30
    note: "Acts 7:30, which recounts Moses' encounter with God at the burning bush, serves as a cross-reference to emphasize God's direct communication and calling of His chosen leaders, reflecting the theme of divine revelation and mission that resonates throughout Scripture."
  - book: Acts
    chapter: 7
    verse: 31
    note: "Acts 7:31 is a cross-reference to Exodus 3:2, as both verses highlight the divine manifestation of God to Moses through the burning bush, underscoring themes of divine calling and the revelation of God's purpose for His chosen servant amidst the backdrop of Israel's oppression."
  - book: Acts
    chapter: 7
    verse: 32
    note: "Acts 7:32 cites God's self-revelation to Moses at the burning bush, illustrating His identity as the God of Abraham, Isaac, and Jacob, which serves as a pivotal cross-reference to emphasize God's enduring covenant relationship with Israel and foreshadows the redemptive work fulfilled in Christ."
  - book: Acts
    chapter: 7
    verse: 33
    note: "Acts 7:33 references God’s command to Moses from the burning bush, highlighting the holiness of God's presence, which serves as a cross-reference to the broader theme of divine revelation and the sanctity of God's calling in Scripture."
