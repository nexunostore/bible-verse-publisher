    note: "1 John 5:1 serves as a cross-reference because it emphasizes the foundational truth that faith in Jesus as the Christ not only brings about spiritual rebirth but also unites believers as children of God, highlighting the interconnectedness of faith, love, and divine identity central to Christian theology. "
