  - book: Matthew
    chapter: 5
    verse: 20
    note: "Matthew 5:20 emphasizes the necessity of a righteousness that surpasses that of the Pharisees and the teachers of the law, highlighting the transformative nature of true faith that fulfills the law's intent, making it a cross-reference for understanding the deeper moral and spiritual dimensions of righteousness throughout the Scriptures. "
